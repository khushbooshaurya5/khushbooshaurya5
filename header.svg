<svg width="900" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="50%" style="stop-color:#161B22"/>
      <stop offset="100%" style="stop-color:#0D1117"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58A6FF">
        <animate attributeName="stop-color" values="#58A6FF;#79C0FF;#A371F7;#58A6FF" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#A371F7">
        <animate attributeName="stop-color" values="#A371F7;#58A6FF;#79C0FF;#A371F7" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#79C0FF">
        <animate attributeName="stop-color" values="#79C0FF;#A371F7;#58A6FF;#79C0FF" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>

  <!-- Animated particles -->
  <circle cx="50" cy="40" r="2" fill="#58A6FF" opacity="0.6">
    <animate attributeName="cy" values="40;160;40" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="160" r="1.5" fill="#A371F7" opacity="0.5">
    <animate attributeName="cy" values="160;30;160" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="50" r="2" fill="#79C0FF" opacity="0.6">
    <animate attributeName="cy" values="50;170;50" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="150" r="1.5" fill="#58A6FF" opacity="0.4">
    <animate attributeName="cy" values="150;20;150" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="20" r="1" fill="#A371F7" opacity="0.5">
    <animate attributeName="cy" values="20;180;20" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="100" r="2.5" fill="#79C0FF" opacity="0.3">
    <animate attributeName="cy" values="100;10;100" dur="11s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="80" r="1.5" fill="#58A6FF" opacity="0.5">
    <animate attributeName="cy" values="80;190;80" dur="7.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="120" r="1" fill="#A371F7" opacity="0.6">
    <animate attributeName="cy" values="120;30;120" dur="6.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Animated border line -->
  <rect x="2" y="2" width="896" height="196" fill="none" stroke="url(#textGrad)" stroke-width="1.5" rx="11" opacity="0.5"/>

  <!-- Main title -->
  <text x="450" y="90" font-family="'Courier New', monospace" font-size="36" font-weight="bold"
        fill="url(#textGrad)" text-anchor="middle" filter="url(#glow)">
    Khushboo Kumari
    <animate attributeName="opacity" values="1;0.8;1" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle -->
  <text x="450" y="125" font-family="'Courier New', monospace" font-size="16"
        fill="#8B949E" text-anchor="middle">
    ML Engineer · Computer Vision · AI Research
  </text>

  <!-- Typing cursor effect -->
  <text x="450" y="158" font-family="'Courier New', monospace" font-size="13"
        fill="#3FB950" text-anchor="middle">
    &gt; Building production-ready ML systems_
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </text>

  <!-- Decorative dots -->
  <circle cx="30" cy="100" r="3" fill="#3FB950" opacity="0.8">
    <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="870" cy="100" r="3" fill="#3FB950" opacity="0.8">
    <animate attributeName="r" values="3;5;3" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>
</svg>
