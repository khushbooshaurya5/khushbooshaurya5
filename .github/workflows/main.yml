name: Daily ML Facts Update

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Generate Daily Content
        run: |
          mkdir -p til
          python3 << 'EOF'
          import datetime
          import random

          today = datetime.date.today()
          day_of_year = today.timetuple().tm_yday

          ml_topics = [
              ("Attention Mechanism", "Transformers use attention to weigh importance of each token relative to others."),
              ("Gradient Descent", "Optimization algorithm that minimizes loss by moving in direction of steepest descent."),
              ("Batch Normalization", "Normalizes layer inputs to stabilize and accelerate training."),
              ("Dropout Regularization", "Randomly disables neurons during training to prevent overfitting."),
              ("Transfer Learning", "Using pretrained model weights as starting point for new tasks."),
              ("FAISS Indexing", "Facebook AI Similarity Search enables fast nearest-neighbor lookup in vector space."),
              ("RAG Pipeline", "Retrieval Augmented Generation combines search with LLM for grounded responses."),
              ("Hough Transform", "Detects geometric shapes like circles and lines in images using parameter space voting."),
              ("Data Drift Detection", "Monitoring statistical distribution shifts in ML pipeline input features over time."),
              ("KAN Networks", "Kolmogorov-Arnold Networks use learnable activation functions on edges instead of nodes."),
              ("YOLOv9", "Real-time object detection using single neural network pass for speed and accuracy."),
              ("Coordinate Alignment", "Sub-pixel precision alignment of measurement data using geometric transformations."),
              ("Hyperspectral Imaging", "Captures 50+ spectral bands to detect material properties invisible to RGB cameras."),
              ("Feature Extraction", "Transforming raw data into meaningful representations for ML model input."),
              ("Confusion Matrix", "Table showing TP, TN, FP, FN to evaluate classification model performance."),
              ("Precision vs Recall", "Precision measures false positives; Recall measures false negatives in classification."),
              ("F1 Score", "Harmonic mean of precision and recall — best metric for imbalanced datasets."),
              ("PCA", "Principal Component Analysis reduces dimensionality while preserving maximum variance."),
              ("UMAP", "Uniform Manifold Approximation for fast high-dimensional data visualization."),
              ("Semantic Segmentation", "Assigns class label to every pixel in image for dense scene understanding."),
          ]

          topic, explanation = ml_topics[day_of_year % len(ml_topics)]

          content = f"## 📅 {today.strftime('%B %d, %Y')}\n\n### 💡 Concept: {topic}\n{explanation}\n\n---\n"

          with open("til/today.md", "w") as f:
              f.write(content)

          with open("til/log.md", "a") as f:
              f.write(f"\n### {today} — {topic}\n> {explanation}\n")

          print(topic)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.email "khushbooshaurya@gmail.com"
          git config --global user.name "khushbooshaurya5"
          git add .
          git diff --staged --quiet || git commit -m "📚 TIL: $(cat til/today.md | grep '### 💡' | sed 's/### 💡 Concept: //')"
          git push
